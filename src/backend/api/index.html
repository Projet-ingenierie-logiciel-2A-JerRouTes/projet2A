<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - {{ app_name }}</title>
    <style>
        :root {
            --primary: #3b82f6;
            --success: #10b981;
            --bg: #f0f2f5;
            --text: #1e293b;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .container {
            max-width: 750px;
            margin: auto;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        h1 {
            color: #2c3e50;
            border-bottom: 3px solid var(--primary);
            padding-bottom: 15px;
            margin-top: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .badge {
            font-size: 0.4em;
            background: var(--success);
            color: white;
            padding: 6px 12px;
            border-radius: 50px;
            text-transform: uppercase;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 30px 0;
        }

        .info-card {
            background: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }

        .info-card.highlight {
            border-left: 4px solid var(--success);
            background: #ecfdf5;
        }

        .info-card h3 {
            margin: 0 0 10px 0;
            font-size: 0.75em;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-card p {
            margin: 0;
            font-weight: 700;
            color: #1e293b;
            font-size: 1.1em;
        }

        /* Style du Switch */
        .switch-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 10px;
        }

        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #cbd5e1; transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px; left: 4px;
            bottom: 4px; background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(24px); }

        .action-zone {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 18px;
            text-align: center;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.05em;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-frontend { background: var(--success); color: white; }
        .btn-frontend:hover { background: #059669; transform: translateY(-3px); }

        .btn-swagger { background: var(--primary); color: white; }
        .btn-swagger:hover { background: #2563eb; transform: translateY(-3px); }

        .footer {
            text-align: center;
            font-size: 0.85em;
            color: #94a3b8;
            margin-top: 40px;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 {{ app_name }} <span class="badge">Active</span></h1>

        <div class="info-grid">
            <div class="info-card">
                <h3>Établissement</h3>
                <p>ENSAI - Projet 2A</p>
            </div>
            <div class="info-card">
                <h3>Version API</h3>
                <p>1.0.0 (Stable)</p>
            </div>
            <div class="info-card highlight">
                <h3>Source des Données</h3>
                <div class="switch-container">
                    <p id="modeText" style="margin:0;">{{ data_mode_text }}</p>
                    <label class="switch">
                        <input type="checkbox" id="seedToggle" {{ 'checked' if use_seed_data == 'true' else '' }}>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
            <div class="info-card">
                <h3>Hôte Frontend</h3>
                <p>{{ frontend_url }}</p>
            </div>
        </div>

        <div class="action-zone">
            <a href="{{ frontend_url }}" target="_blank" rel="noopener noreferrer" class="btn btn-frontend">🌐 Ouvrir le Frontend</a>
            <a href="/docs" target="_blank" rel="noopener noreferrer" class="btn btn-swagger">📄 Documentation Swagger</a>
        </div>

        <div class="footer">
            Dernière synchro : {{ time }} | Statut : Branches nettoyées
        </div>
    </div>

    <script>
        const toggle = document.getElementById('seedToggle');
        const text = document.getElementById('modeText');

        toggle.addEventListener('change', async () => {
            const isSeed = toggle.checked;

            try {
                const response = await fetch('/system/toggle-data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ use_seed: isSeed })
                });

                if (response.ok) {
                    const result = await response.json();
                    text.innerText = isSeed ? "Mode Démo" : "Base Réelle";
                    console.log("Mode mis à jour :", result.current_mode);
                } else {
                    alert("Erreur serveur lors du changement de mode.");
                    toggle.checked = !isSeed;
                }
            } catch (err) {
                console.error("Erreur réseau :", err);
                alert("Impossible de contacter le serveur.");
                toggle.checked = !isSeed;
            }
        });
    </script>
</body>
</html>
