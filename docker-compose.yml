# Note : La ligne 'version' est supprimée pour éviter le Warning Docker Compose V2.

services:
  # ============================================================================
  # SERVICE : BASE DE DONNÉES (Le socle de stockage)
  # ============================================================================
  db:
    # Utilisation d'une version stable de PostgreSQL
    image: postgres:16
    container_name: projet2a_postgres

    # Redémarre automatiquement le conteneur si le PC redémarre ou si le service crash
    restart: always

    # ============================================================================
    # CONFIGURATION DES IDENTIFIANTS (via le .env du backend)
    # ----------------------------------------------------------------------------
    # On utilise directement le fichier src/backend/.env pour que :
    #  - le backend ET la base utilisent exactement les mêmes identifiants
    #  - il n'y ait plus de dépendance au .env racine
    #  - Docker Compose n'ait plus à résoudre des ${POSTGRES_*}
    # ============================================================================
    env_file:
      - ./src/backend/.env

    # Expose le port de la base pour pouvoir y accéder depuis un outil comme DBeaver
    ports:
      - "5432:5432"

    volumes:
      # ============================================================================
      # PERSISTANCE
      # ----------------------------------------------------------------------------
      # Lie un volume Docker au dossier de données de Postgres.
      # Même après un 'docker compose down', les données restent sauvegardées.
      # ============================================================================
      - projet2a_pgdata:/var/lib/postgresql/data

      # ============================================================================
      # INITIALISATION AUTOMATIQUE (SQL UNIQUEMENT)
      # ----------------------------------------------------------------------------
      # Chaque fichier .sql dans ./src/backend/data est exécuté UNIQUEMENT au
      # premier lancement (quand le volume est vide).
      # Indispensable pour créer les tables (init_db.sql).
      #
      # ⚠️ IMPORTANT :
      # Les imports Python (CSV/ODS pour ingrédients) NE PEUVENT PAS être faits ici,
      # car Postgres n'exécute pas du Python. C'est le rôle du service db_init.
      # ============================================================================
      - ./src/backend/data:/docker-entrypoint-initdb.d/

    # ============================================================================
    # ISOLATION & SÉCURITÉ
    # ----------------------------------------------------------------------------
    # On vérifie que Postgres répond correctement avant de déclarer le service
    # comme "healthy".
    # Les $$ sont nécessaires pour éviter que Docker Compose ne remplace les
    # variables trop tôt.
    # ============================================================================
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ============================================================================
  # SERVICE : INITIALISATION DES DONNÉES (Python)
  # ----------------------------------------------------------------------------
  # Objectif :
  #  - Lancer le script Python de reset/initialisation après que Postgres soit healthy
  #  - Importer les ingrédients depuis CSV + les tags depuis ODS
  #
  # Pourquoi c'est nécessaire ?
  #  - /docker-entrypoint-initdb.d ne gère que du SQL
  #  - Or tes ingrédients/tags sont importés via Python (pandas + odf)
  #
  # IMPORTANT :
  #  - Ce service tourne "one-shot" (restart: "no")
  #  - Il doit finir avec succès avant que le backend démarre
  # ============================================================================
  db_init:
    build: ./src/backend
    container_name: projet2a_db_init
    restart: "no"

    # On reprend les mêmes variables que le backend
    env_file:
      - ./src/backend/.env

    environment:
      # Dans Docker, la DB se joint via le nom du service Docker "db"
      - POSTGRES_HOST=db
      # On force le schéma "réel"
      - POSTGRES_SCHEMA=projet_dao

    volumes:
      # On monte le backend à /app pour que les chemins /app/data/*.csv et /app/data/*.ods existent
      - ./src/backend:/app

    depends_on:
      db:
        condition: service_healthy

    # Lance ton reset Python (qui fait structure + imports CSV/ODS)
    command: >
      sh -lc "uv run python utils/reset_database.py"

  # ============================================================================
  # SERVICE : BACKEND (L'intelligence en Python FastAPI)
  # ============================================================================
  backend:
    # Docker va chercher le 'Dockerfile' dans le dossier spécifié
    build: ./src/backend
    container_name: projet2a_backend
    restart: always

    env_file:
      - ./src/backend/.env

    volumes:
      # MODE DÉVELOPPEMENT : Lie votre code source au dossier /app du conteneur.
      # Permet de voir vos modifs de code en temps réel sans tout reconstruire.
      #- ./src/backend:/app
      - ./src:/app/src

    ports:
      - "8000:8000"

    environment:
      # On utilise le nom du service 'db' comme nom d'hôte (Network Docker).
      # Docker pioche ces valeurs directement dans ton .env
      - POSTGRES_HOST
      - POSTGRES_PORT
      - POSTGRES_DATABASE
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_SCHEMA
      - PYTHONPATH=/app

    # ============================================================================
    # ORCHESTRATION
    # ----------------------------------------------------------------------------
    # Le backend ne démarre QUE quand :
    #  1) Postgres est "healthy"
    #  2) db_init a fini avec succès (ingrédients/tags importés)
    # ============================================================================
    depends_on:
      db:
        condition: service_healthy
      db_init:
        condition: service_completed_successfully

  # ============================================================================
  # SERVICE : FRONTEND (L'interface en React + Vite)
  # ============================================================================
  frontend:
    build: ./src/frontend
    container_name: projet2a_frontend
    restart: always

    volumes:
      # Synchronisation du code pour le Hot Reload de Vite
      - ./src/frontend:/app
      # Évite que le volume n'écrase les node_modules installés lors du build
      - /app/node_modules

    ports:
      - "5173:5173"

    # Le front dépend du backend pour fonctionner correctement
    depends_on:
      - backend

# ==============================================================================
# SECTION VOLUMES : Déclaration du stockage nommé
# ==============================================================================
volumes:
  # Ce volume est géré par Docker et persiste en dehors du cycle de vie des conteneurs.
  projet2a_pgdata: